<!DOCTYPE html>
<html>
    <head>
        <title>Estaciones Bicicleta</title>
        <link href="styles/styles.css" rel="stylesheet">
    </head>
    <body>
        <h3 style="font-family: fantasy;">Listado Estaciones</h3>
        <hr>
        <form action="buscar.html" method="get">
            <label for="input-nombre-dir">Nombre o dirección:</label>
            <input type="text" id="input-nombre-dir">
            <label for="select-barrio">Barrio:</label>
            <select id="select-barrio">
                <option value="1">Ciudad Universitaria</option>
                <option value="2">Nueva Córdoba</option>
                <option value="3">Centro</option>
                <option value="4">Alberdi</option>
            </select>
            <label for="checkbox-inactivas">Incluir estaciones inactivas:</label>
            <input type="checkbox">
            <button type="submit">Buscar</button>
        </form>
        <hr>
        <table width="70%">
            <thead>
                <tr>
                    <th>Nro</th>
                    <th>Nombre</th>
                    <th>Dirección</th>
                    <th>Barrio</th>
                    <th>Activa</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Salida</td>
                    <td>Cruz Roja 200</td>
                    <td>Ciudad Universitaria</td>
                    <td>Sí</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Descanso 1</td>
                    <td>José Manuel Estrada 300</td>
                    <td>Nueva Córdoba</td>
                    <td>No</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Descanso 2</td>
                    <td>San Martín 0</td>
                    <td>Centro</td>
                    <td>Sí</td>
                </tr>
                <tr>
                    <td>4</td>
                    <td>Llegada</td>
                    <td>Colon 1500</td>
                    <td>Alberdi</td>
                    <td>Sí</td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
