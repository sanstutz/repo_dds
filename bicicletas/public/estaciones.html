<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estaciones Bicicleta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="styles/styles.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        main {
            flex: 1;
        }
        header {
            background-image: url('images/banner.jpg');
            background-size: cover;
            background-position: center;
            color: white;
            height: 250px;
            position: relative;
        }
        header nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }
        header .nav-pills .nav-link {
            background-color: rgb(13, 110, 253); /* mismo color que bg-primary */
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
        }
        header .nav-pills .nav-link.active {
            background-color: white;
            color: #0d6efd;
        }
        .usuario-pill {
            position: absolute;
            top: 10px;
            right: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #0d6efd;
            padding: 6px 15px;
            border-radius: 50px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <header class="text-white">
        <div class="container py-5 h-100 position-relative">
            <div class="usuario-pill">
                <i class="bi bi-person-circle"></i>
                <span>Nombre Apellido</span>
            </div>
            <nav class="mt-3">
                <ul class="nav nav-pills nav-fill gap-2 p-1 small bg-primary rounded-5 shadow-sm justify-content-center"
                    id="pillNav" role="tablist">
                    <li class="nav-item" role="presentation">
                        <a class="nav-link rounded-5" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item" role="presentation">
                        <a class="nav-link rounded-5" href="alquileres.html">Alquileres</a>
                    </li>
                    <li class="nav-item" role="presentation">
                        <a class="nav-link active rounded-5" href="estaciones.html">Estaciones</a>
                    </li>
                    <li class="nav-item" role="presentation">
                        <a class="nav-link rounded-5" href="datos.html">Mis Datos</a>
                    </li>
                    <li class="nav-item" role="presentation">
                        <a class="nav-link rounded-5" href="contacto.html">Contacto</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container my-4">
        <h1>Listado Estaciones</h1>
        <hr>
        <form class="row g-3" id="form-busqueda">
            <div class="col-md-4">
                <label class="form-label" for="input-nombre-dir">Nombre o dirección:</label>
                <input class="form-control" type="text" id="input-nombre-dir">
            </div>
            <div class="col-md-4">
                <label class="form-label" for="select-barrio">Barrio:</label>
                <select class="form-select" id="select-barrio">
                    <option value="1">Todos</option>
                    <option value="2">Ciudad Universitaria</option>
                    <option value="3">Nueva Córdoba</option>
                    <option value="4">Centro</option>
                    <option value="5">Alberdi</option>
                </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <div class="form-check">
                    <label class="form-check-label" for="checkbox-inactivas">Estaciones inactivas</label>
                    <input class="form-check-input" type="checkbox" id="checkbox-inactivas">
                </div>
            </div>
            <div class="col-md-2 d-flex align-items-end justify-content-end">
                <button class="btn btn-primary w-100" type="submit">Buscar</button>
            </div>
        </form>
        <hr>
        <table class="table table-bordered">
            <thead class="table-primary">
                <tr>
                    <th>Nro</th>
                    <th>Nombre</th>
                    <th>Dirección</th>
                    <th>Barrio</th>
                    <th>Activa</th>
                </tr>
            </thead>
            <tbody id="cuerpo-estaciones">
                
            </tbody>
        </table>
    </main>

    <footer class="bg-info text-white text-center py-2">
        <p class="mb-0">Sitio educativo de práctica - DDS 3K2</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/front.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const formFiltro = document.getElementById("form-busqueda");
            if (formFiltro) {
                formFiltro.addEventListener("submit", cargarEstaciones);
            }
            cargarEstaciones();
        });
    </script>
</body>
</html>
