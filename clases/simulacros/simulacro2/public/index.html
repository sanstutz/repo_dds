<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locales Starbucks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script type="module" src="js/front.js"></script>
</head>
<body>

  <header class="starbucks-banner text-white">
  </header>

  <main class="container my-5">
    <h1 class="mb-4">Locales de Starbucks</h1>

    <form id="form-filtro" class="row g-3 mb-1">
      <div class="col-md-3">
        <label for="texto" class="form-label">Buscar:</label>
        <input type="text" class="form-control" id="texto">
      </div>
      <div class="col-md-2">
        <label for="latitud" class="form-label">Latitud:</label>
          <select class="form-select" id="latitud">
            <option value="A">Ambas</option>
            <option value="N">Norte</option>
            <option value="S">Sur</option>
          </select>
      </div>
      <div class="col-md-2">
        <label for="longitud" class="form-label">Longitud:</label>
        <select class="form-select" id="longitud">
          <option value="A">Ambas</option>
          <option value="E">Este</option>
          <option value="O">Oeste</option>
        </select>
      </div>
      <div class="col-md-3">
        <label for="pais" class="form-label">Pais:</label>
        <select id="pais" class="form-select">
        </select>
      </div>
      <div class="col-md-2 d-flex align-items-end justify-content-center">
        <button class="btn btn-primary" style="width: 100%;" type="submit" id="boton">Filtrar</button>
      </div>
    </form>
    <form class="row">
      <div class="col-md-3">
        <label for="ordenar" class="form-label">Ordenar por:</label>
        <select id="ordenar" class="form-select"></select>
      </div>
      <div class="col-md-3 d-flex align-items-end">
        <div class="form-check">
          <label for="ascendente" class="form-label">Ascendente</label>
          <input type="checkbox" id="ascendente" class="form-check-input" checked="true">
        </div>
      </div>
    </form>
    <table id="tablaLocales" class="table table-bordered table-striped mt-3">
      <thead class="table-success">
        <tr>
          <th>Nombre</th>
          <th>Dirección</th>
          <th>Ciudad</th>
          <th>Provincia</th>
          <th>País</th>
          <th>Semi Hemisferio</th>
        </tr>
      </thead>
      <tbody id="bodyTablaLocales">
        <!-- Ejemplo de fila -->
        <tr>
          <td>Starbucks Patio Olmos</td>
          <td>Av. Vélez Sarsfield 361</td>
          <td>Córdoba</td>
          <td>Córdoba</td>
          <td>Argentina</td>
          <td>Sudoeste (SO)</td>
        </tr>
      </tbody>
    </table>
  </main>

  <footer class="bg-info text-white text-center py-2">
    <p class="mb-0">Sitio educativo de práctica - DDS 3K2 &amp; 3K3B</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
